<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-CAPAI SKBT - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #ffffff; }
        .bg-custom-yellow { background-color: #FFD700; }
        .tab-active { border-bottom: 4px solid #FFD700; color: #000; font-weight: bold; }
        @media print {
            .no-print { display: none !important; }
            .print-area { display: block !important; width: 100%; }
            table { width: 100%; border-collapse: collapse; }
            th, td { border: 1px solid #000; padding: 8px; text-align: left; }
        }
        .stats-card { transition: transform 0.2s; }
        .stats-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Header -->
    <header class="bg-custom-yellow p-6 shadow-md no-print">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center space-x-4">
                <div class="bg-white p-2 rounded-full shadow">
                    <i class="fas fa-graduation-cap text-3xl text-yellow-600"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">e-CAPAI SK BUKIT TONGKAT</h1>
                    <p class="text-sm text-gray-700">Sistem Rekod Pencapaian Sekolah & Guru</p>
                </div>
            </div>
            <div class="mt-4 md:mt-0 flex space-x-2">
                <button onclick="copyShareLink()" class="bg-white text-gray-800 px-4 py-2 rounded-lg shadow hover:bg-gray-100 flex items-center font-semibold text-sm">
                    <i class="fas fa-share-alt mr-2"></i> KONGSI PAUTAN SEMAKAN
                </button>
            </div>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="bg-white shadow-sm sticky top-0 z-10 no-print">
        <div class="container mx-auto flex overflow-x-auto border-b">
            <button onclick="showTab('sekolah')" id="tab-sekolah" class="px-6 py-4 whitespace-nowrap transition hover:bg-yellow-50 tab-active">
                <i class="fas fa-school mr-2"></i> SEKOLAH
            </button>
            <button onclick="showTab('individu')" id="tab-individu" class="px-6 py-4 whitespace-nowrap transition hover:bg-yellow-50">
                <i class="fas fa-user mr-2"></i> INDIVIDU
            </button>
            <button onclick="showTab('rekod-sekolah')" id="tab-rekod-sekolah" class="px-6 py-4 whitespace-nowrap transition hover:bg-yellow-50">
                <i class="fas fa-list-ul mr-2"></i> REKOD SEKOLAH
            </button>
            <button onclick="showTab('rekod-guru')" id="tab-rekod-guru" class="px-6 py-4 whitespace-nowrap transition hover:bg-yellow-50">
                <i class="fas fa-users-viewfinder mr-2"></i> REKOD GURU
            </button>
            <button onclick="showTab('analisa')" id="tab-analisa" class="px-6 py-4 whitespace-nowrap transition hover:bg-yellow-50 text-blue-600">
                <i class="fas fa-chart-pie mr-2"></i> ANALISA PENCAPAIAN
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto p-4 md:p-8">

        <!-- BORANG SEKOLAH -->
        <section id="content-sekolah" class="tab-content">
            <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg border-t-8 border-yellow-400 p-6 md:p-10">
                <h2 class="text-2xl font-bold mb-6 flex items-center text-gray-800">
                    <i class="fas fa-file-signature text-yellow-500 mr-3"></i> BORANG REKOD SEKOLAH
                </h2>
                <form id="formSekolah" onsubmit="saveData(event, 'sekolah')">
                    <input type="hidden" id="edit-id-sekolah">
                    <div class="grid grid-cols-1 gap-6">
                        <div>
                            <label class="block font-semibold mb-2">2.1 Peringkat (Sila Pilih)</label>
                            <select id="peringkat-sekolah" required class="w-full p-3 border rounded-lg">
                                <option value="">-- Pilih --</option>
                                <option>DAERAH</option><option>NEGERI</option><option>KEBANGSAAN</option><option>ANTARABANGSA</option>
                            </select>
                        </div>
                        <div>
                            <label class="block font-semibold mb-2">2.2 Program/Aktiviti/Pertandingan</label>
                            <input type="text" id="program-sekolah" required class="w-full p-3 border rounded-lg">
                        </div>
                        <div>
                            <label class="block font-semibold mb-2">2.3 Pautan Eviden Sekolah</label>
                            <a href="https://drive.google.com/drive/folders/1araUUb_m405qeqwSCmDOTliM5McmKrDd?usp=sharing" target="_blank" class="text-blue-600 block bg-blue-50 p-3 rounded-lg border border-blue-100 mb-2">
                                <i class="fab fa-google-drive mr-2"></i> Folder Google Drive Sekolah
                            </a>
                            <input type="url" id="eviden-sekolah" placeholder="Letak pautan spesifik jika ada" class="w-full p-3 border rounded-lg">
                        </div>
                        <div>
                            <label class="block font-semibold mb-2">2.4 Anjuran</label>
                            <input type="text" id="anjuran-sekolah" required class="w-full p-3 border rounded-lg">
                        </div>
                        <div>
                            <label class="block font-semibold mb-2">2.5 Kategori</label>
                            <select id="kategori-sekolah" required class="w-full p-3 border rounded-lg">
                                <option value="">-- Pilih --</option>
                                <option>PERTANDINGAN</option><option>INOVASI</option><option>PENSIJILAN</option><option>ANUGERAH</option><option>PENGIKTIRAFAN</option>
                            </select>
                        </div>
                        <div>
                            <label class="block font-semibold mb-2">2.6 Pencapaian</label>
                            <select id="capai-sekolah" required class="w-full p-3 border rounded-lg">
                                <option value="">-- Pilih --</option>
                                <option>TEMPAT PERTAMA/ANUGERAH/PENGIKTIRAFAN</option><option>TEMPAT KEDUA</option><option>TEMPAT KETIGA</option><option>SAGUHATI</option><option>PENYERTAAN</option>
                            </select>
                        </div>
                        <button type="submit" class="bg-custom-yellow hover:bg-yellow-500 font-bold py-3 rounded-lg shadow transition">SIMPAN REKOD SEKOLAH</button>
                    </div>
                </form>
            </div>
        </section>

        <!-- BORANG INDIVIDU -->
        <section id="content-individu" class="tab-content hidden">
            <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg border-t-8 border-yellow-400 p-6 md:p-10">
                <h2 class="text-2xl font-bold mb-6 flex items-center text-gray-800">
                    <i class="fas fa-user-edit text-yellow-500 mr-3"></i> BORANG REKOD INDIVIDU
                </h2>
                <form id="formGuru" onsubmit="saveData(event, 'guru')">
                    <input type="hidden" id="edit-id-guru">
                    <div class="grid grid-cols-1 gap-6">
                        <div>
                            <label class="block font-semibold mb-2">3.1 Peringkat</label>
                            <select id="peringkat-guru" required class="w-full p-3 border rounded-lg">
                                <option value="">-- Pilih --</option>
                                <option>DAERAH</option><option>NEGERI</option><option>KEBANGSAAN</option><option>ANTARABANGSA</option>
                            </select>
                        </div>
                        <div>
                            <label class="block font-semibold mb-2">3.2 Program/Aktiviti/Pertandingan</label>
                            <input type="text" id="program-guru" required class="w-full p-3 border rounded-lg">
                        </div>
                        <div>
                            <label class="block font-semibold mb-2">3.3 Nama Guru</label>
                            <select id="guruSelect" onchange="updateEvidenGuru()" required class="w-full p-3 border rounded-lg">
                                <option value="">-- Pilih Nama Guru --</option>
                                <option data-drive="https://drive.google.com/drive/folders/1u_kumvl2ChnxHPmekUgObtxx2zdqHSTN?usp=sharing">ADLIN FAZLINDA BINTI ASNAN</option>
                                <option data-drive="https://drive.google.com/drive/folders/1tuEea9LUIA-zF2XD2oyTcLiQhtR-6VIK?usp=sharing">DAYANG NORFARAHAIN FAEEZA BINTI HASSIM</option>
                                <option data-drive="https://drive.google.com/drive/folders/1Tpr_xlYxBtN6Dk1f2Qqet5EPgpeV3SpM?usp=sharing">KHAIRULAZMAN BIN DOLLAH</option>
                                <option data-drive="https://drive.google.com/drive/folders/1h3YNfdtdZqSfaTX84cV3XwsZvLVnG9Gl?usp=sharing">MAISARATUL SYABRINA IZZATI BINTI MUHAMAD SHUKRI</option>
                                <option data-drive="https://drive.google.com/drive/folders/1H2Jrtr0pc6qoDr1kq5hF0B36Kg5fMgq5?usp=sharing">MASTAHIR BIN MD. AMIN</option>
                                <option data-drive="https://drive.google.com/drive/folders/1tdjXHx3bMNvbaMOTAXC2ehuhyRw3AKDJ?usp=sharing">NORMAZIDA BINTI AHMAD</option>
                                <option data-drive="https://drive.google.com/drive/folders/1FOPSizHpG-pKH_znLCRLExxPiHIGY-hl?usp=sharing">MAZUIN BINTI AHMAD KAMIL</option>
                                <option data-drive="https://drive.google.com/drive/folders/1dHNGPlD63lFpFWYkFeVCFzc79DSWJ2uU?usp=sharing">MOHD FAEIZ BIN SANUSI</option>
                                <option data-drive="https://drive.google.com/drive/folders/1bzoI2EL2tCxiEI5OhHXYgpx6cjj4fe-J?usp=sharing">MOHD FAIZAL BIN AHMAD</option>
                                <option data-drive="https://drive.google.com/drive/folders/1ui3OKAjSdvFbnY22AbtstRn3CaPaPaN7aZ?usp=sharing">NOHD HIJRAN BIN AHMAD IDRUS</option>
                                <option data-drive="https://drive.google.com/drive/folders/1Dkurl0f8iTU6RHISQPAxHnV7RxgTls33?usp=sharing">MOHD NOOR RASHID BIN WAGIMAN</option>
                                <option data-drive="https://drive.google.com/drive/folders/1BZUcS4D2zQOfHwly50M1Zi7KZuOvhCjP?usp=sharing">MUZAFFAR AHMAD BIN ZAINAL ABIDIN</option>
                                <option data-drive="https://drive.google.com/drive/folders/1NwNEcXKlvG8LEOgYDYkbgi97fnW-LpVL?usp=sharing">NOOR HASLINDA BINTI MOHD NASIRAN</option>
                                <option data-drive="https://drive.google.com/drive/folders/1bA-vpVh6QO2b2qY1FPDvMtZ-gSX6QWFw?usp=sharing">NORAZLINAWATI BINTI MAHMOOD</option>
                                <option data-drive="https://drive.google.com/drive/folders/1Si-IaR5HTxZCqOYStLClNhYsxowuyAVL?usp=sharing">NORHIDAYAH BINTI MOHAMAD</option>
                                <option data-drive="https://drive.google.com/drive/folders/1T5orYpUtPvzPsxtALMH5zJmyF59C4wJN?usp=sharingNo response
