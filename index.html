<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-CAPAI SKBT - Dashboard Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #ffffff; }
        .bg-custom-yellow { background-color: #FFD700; }
        .tab-active { border-bottom: 4px solid #FFD700; color: #000; font-weight: bold; }
        @media print {
            .no-print { display: none !important; }
            .print-area { display: block !important; width: 100%; }
            table { width: 100%; border-collapse: collapse; }
            th, td { border: 1px solid #000; padding: 8px; text-align: left; }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <header class="bg-custom-yellow p-6 shadow-md no-print">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center space-x-4">
                <div class="bg-white p-2 rounded-full shadow">
                    <i class="fas fa-graduation-cap text-3xl text-yellow-600"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">e-CAPAI SK BUKIT TONGKAT</h1>
                    <p class="text-sm text-gray-700">Sistem Rekod Pencapaian (Firebase Cloud)</p>
                </div>
            </div>
            <button onclick="copyShareLink()" class="mt-4 md:mt-0 bg-white text-gray-800 px-4 py-2 rounded-lg shadow hover:bg-gray-100 flex items-center font-semibold text-sm">
                <i class="fas fa-share-alt mr-2"></i> KONGSI PAUTAN
            </button>
        </div>
    </header>

    <nav class="bg-white shadow-sm sticky top-0 z-10 no-print">
        <div class="container mx-auto flex overflow-x-auto border-b">
            <button onclick="showTab('sekolah')" id="tab-sekolah" class="px-6 py-4 whitespace-nowrap transition hover:bg-yellow-50 tab-active">
                <i class="fas fa-school mr-2"></i> SEKOLAH
            </button>
            <button onclick="showTab('individu')" id="tab-individu" class="px-6 py-4 whitespace-nowrap transition hover:bg-yellow-50">
                <i class="fas fa-user mr-2"></i> INDIVIDU
            </button>
            <button onclick="showTab('rekod-sekolah')" id="tab-rekod-sekolah" class="px-6 py-4 whitespace-nowrap transition hover:bg-yellow-50">
                <i class="fas fa-list-ul mr-2"></i> REKOD SEKOLAH
            </button>
            <button onclick="showTab('rekod-guru')" id="tab-rekod-guru" class="px-6 py-4 whitespace-nowrap transition hover:bg-yellow-50">
                <i class="fas fa-users-viewfinder mr-2"></i> REKOD GURU
            </button>
        </div>
    </nav>

    <main class="container mx-auto p-4 md:p-8">

        <section id="content-sekolah" class="tab-content">
            <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg border-t-8 border-yellow-400 p-6 md:p-10">
                <h2 class="text-2xl font-bold mb-6 flex items-center text-gray-800">
                    <i class="fas fa-file-signature text-yellow-500 mr-3"></i> REKOD SEKOLAH
                </h2>
                <form id="formSekolah" onsubmit="saveData(event, 'sekolah')">
                    <div class="grid grid-cols-1 gap-6">
                        <div>
                            <label class="block font-semibold mb-2">Peringkat</label>
                            <select id="peringkat-sekolah" required class="w-full p-3 border rounded-lg">
                                <option value="">-- Pilih --</option>
                                <option>DAERAH</option><option>NEGERI</option><option>KEBANGSAAN</option><option>ANTARABANGSA</option>
                            </select>
                        </div>
                        <div>
                            <label class="block font-semibold mb-2">Program/Aktiviti</label>
                            <input type="text" id="program-sekolah" required class="w-full p-3 border rounded-lg">
                        </div>
                        <div>
                            <label class="block font-semibold mb-2">Pautan Eviden (Google Drive)</label>
                            <input type="url" id="eviden-sekolah" placeholder="https://drive.google.com/..." class="w-full p-3 border rounded-lg">
                        </div>
                        <div>
                            <label class="block font-semibold mb-2">Pencapaian</label>
                            <select id="capai-sekolah" required class="w-full p-3 border rounded-lg">
                                <option value="">-- Pilih --</option>
                                <option>TEMPAT PERTAMA/ANUGERAH/PENGIKTIRAFAN</option><option>TEMPAT KEDUA</option><option>TEMPAT KETIGA</option><option>SAGUHATI</option><option>PENYERTAAN</option>
                            </select>
                        </div>
                        <button type="submit" class="bg-custom-yellow hover:bg-yellow-500 font-bold py-3 rounded-lg shadow transition">SIMPAN KE CLOUD</button>
                    </div>
                </form>
            </div>
        </section>

        <section id="content-individu" class="tab-content hidden">
            <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg border-t-8 border-yellow-400 p-6 md:p-10">
                <h2 class="text-2xl font-bold mb-6 flex items-center text-gray-800">
                    <i class="fas fa-user-edit text-yellow-500 mr-3"></i> REKOD INDIVIDU
                </h2>
                <form id="formGuru" onsubmit="saveData(event, 'guru')">
                    <div class="grid grid-cols-1 gap-6">
                        <div>
                            <label class="block font-semibold mb-2">Pilih Nama Guru</label>
                            <select id="guruSelect" onchange="updateEvidenGuru()" required class="w-full p-3 border rounded-lg">
                                <option value="">-- Pilih Nama Guru --</option>
                            </select>
                        </div>
                        <div id="pautanGuruWrapper" class="hidden">
                             <a id="pautanGuruLink" href="#" target="_blank" class="text-blue-600 flex items-center bg-blue-50 p-3 rounded-lg border border-blue-100 mb-4 text-sm font-bold italic">
                                <i class="fab fa-google-drive mr-2"></i> PAUTAN DRIVE GURU DIKESAN
                            </a>
                        </div>
                        <div>
                            <label class="block font-semibold mb-2">Program/Aktiviti</label>
                            <input type="text" id="program-guru" required class="w-full p-3 border rounded-lg">
                        </div>
                        <div>
                            <label class="block font-semibold mb-2">Pencapaian</label>
                            <select id="capai-guru" required class="w-full p-3 border rounded-lg">
                                <option value="">-- Pilih --</option>
                                <option>TEMPAT PERTAMA/ANUGERAH/PENGIKTIRAFAN</option><option>TEMPAT KEDUA</option><option>TEMPAT KETIGA</option><option>SAGUHATI</option><option>PENYERTAAN</option>
                            </select>
                        </div>
                        <button type="submit" class="bg-custom-yellow hover:bg-yellow-500 font-bold py-3 rounded-lg shadow transition">SIMPAN REKOD GURU</button>
                    </div>
                </form>
            </div>
        </section>

        <section id="content-rekod-sekolah" class="tab-content hidden">
            <div class="bg-white rounded-xl shadow-lg p-6 overflow-x-auto">
                <h2 class="text-xl font-bold mb-4">SENARAI PENCAPAIAN SEKOLAH</h2>
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-yellow-100">
                            <th class="p-3 border">BIL</th><th class="p-3 border">TARIKH</th><th class="p-3 border">PROGRAM</th><th class="p-3 border">PENCAPAIAN</th><th class="p-3 border">BUKTI</th>
                        </tr>
                    </thead>
                    <tbody id="table-sekolah-body"></tbody>
                </table>
            </div>
        </section>

        <section id="content-rekod-guru" class="tab-content hidden">
            <div class="bg-white rounded-xl shadow-lg p-6 overflow-x-auto">
                <h2 class="text-xl font-bold mb-4">SENARAI PENCAPAIAN GURU</h2>
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-yellow-100">
                            <th class="p-3 border">BIL</th><th class="p-3 border">NAMA GURU</th><th class="p-3 border">PROGRAM</th><th class="p-3 border">PENCAPAIAN</th><th class="p-3 border">BUKTI</th>
                        </tr>
                    </thead>
                    <tbody id="table-guru-body"></tbody>
                </table>
            </div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIG FIREBASE (Ganti dengan maklumat anda)
        const firebaseConfig = {
            apiKey: "AIzaSyBgO8saVfliDuG5VZDueR9FHG64-DwRjEs", 
            authDomain: "ecapaiskbt.firebaseapp.com",
            projectId: "ecapaiskbt",
            storageBucket: "ecapaiskbt.firebasestorage.app",
            messagingSenderId: "328855405603",
            appId: "1:328855405603:web:32c5e193845b237e065d96"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // MASTER DATA GURU
        const MASTER_GURU_LIST = [
            { name: "ADLIN FAZLINDA BINTI ASNAN", drive: "https://drive.google.com/drive/folders/1u_kumvl2ChnxHPmekUgObtxx2zdqHSTN" },
            { name: "DAYANG NORFARAHAIN FAEEZA BINTI HASSIM", drive: "https://drive.google.com/drive/folders/1tuEea9LUIA-zF2XD2oyTcLiQhtR-6VIK" },
            { name: "KHAIRULAZMAN BIN DOLLAH", drive: "https://drive.google.com/drive/folders/1Tpr_xlYxBtN6Dk1f2Qqet5EPgpeV3SpM" },
            { name: "MAISARATUL SYABRINA IZZATI BINTI MUHAMAD SHUKRI", drive: "https://drive.google.com/drive/folders/1h3YNfdtdZqSfaTX84cV3XwsZvLVnG9Gl" },
            { name: "MASTAHIR BIN MD. AMIN", drive: "https://drive.google.com/drive/folders/1H2Jrtr0pc6qoDr1kq5hF0B36Kg5fMgq5" },
            { name: "NORMAZIDA BINTI AHMAD", drive: "https://drive.google.com/drive/folders/1tdjXHx3bMNvbaMOTAXC2ehuhyRw3AKDJ" },
            { name: "MAZUIN BINTI AHMAD KAMIL", drive: "https://drive.google.com/drive/folders/1FOPSizHpG-pKH_znLCRLExxPiHIGY-hl" },
            { name: "MOHD FAEIZ BIN SANUSI", drive: "https://drive.google.com/drive/folders/1dHNGPlD63lFpFWYkFeVCFzc79DSWJ2uU" },
            { name: "MOHD FAIZAL BIN AHMAD", drive: "https://drive.google.com/drive/folders/1bzoI2EL2tCxiEI5OhHXYgpx6cjj4fe-J" },
            { name: "NOHD HIJRAN BIN AHMAD IDRUS", drive: "https://drive.google.com/drive/folders/1ui3OKAjSdvFbnY22AbtstRn3CaPaPaN7aZ" },
            { name: "MOHD NOOR RASHID BIN WAGIMAN", drive: "https://drive.google.com/drive/folders/1Dkurl0f8iTU6RHISQPAxHnV7RxgTls33" },
            { name: "MUZAFFAR AHMAD BIN ZAINAL ABIDIN", drive: "https://drive.google.com/drive/folders/1BZUcS4D2zQOfHwly50M1Zi7KZuOvhCjP" },
            { name: "NOOR HASLINDA BINTI MOHD NASIRAN", drive: "https://drive.google.com/drive/folders/1NwNEcXKlvG8LEOgYDYkbgi97fnW-LpVL" },
            { name: "NORAZLINAWATI BINTI MAHMOOD", drive: "https://drive.google.com/drive/folders/1bA-vpVh6QO2b2qY1FPDvMtZ-gSX6QWFw" },
            { name: "NORHIDAYAH BINTI MOHAMAD", drive: "https://drive.google.com/drive/folders/1Si-IaR5HTxZCqOYStLClNhYsxowuyAVL" },
            { name: "NORSAADAH BINTI JAILANI", drive: "https://drive.google.com/drive/folders/1T5orYpUtPvzPsxtALMH5zJmyF59C4wJN" },
            { name: "NORZAIMAH BINTI ZAKARIA", drive: "https://drive.google.com/drive/folders/1k8e_orxreEMAv1fwakrZKtMf6WVTPG2H" },
            { name: "NUR 'AMALIA BINTI HASAN ZAKI", drive: "https://drive.google.com/drive/folders/1VQXZ6BYew8ttGymx_HkT_Mlu8DUigVI2" },
            { name: "NURUL NAJIHAH BINTI SAHLAN", drive: "https://drive.google.com/drive/folders/1NkZNWaoXpa9JSbECz_1_uUNXYU75GkZa" },
            { name: "PSPA LAILA BINTI OTHMAN", drive: "https://drive.google.com/drive/folders/1J7PNN2mZGiFiFdvGuw5qhGVbK6NqkPT7" },
            { name: "RAZIDAH BINTI MOHAMED", drive: "https://drive.google.com/drive/folders/1gt_wXG-iQKBnVhfyLupgPTTmumo10QL3" },
            { name: "ROSELINDA BINTI LAZIM", drive: "https://drive.google.com/drive/folders/1RgFQAd8lAWEvmeoLLhQtsA6CKmvK5fXk" },
            { name: "RUMINI BINTI TUKIMAN", drive: "https://drive.google.com/drive/folders/1GNBPbCi917rY8l24f8v26iktI9Mb_ljx" },
            { name: "SITI NOOR FAKHARIYAH BINTI MD. SHAHID", drive: "https://drive.google.com/drive/folders/16r6OLhCjeoskbxUVoYnuIclsTl0d7_B8" },
            { name: "SHAHMINA WARDAH BINTI SUARDI", drive: "https://drive.google.com/drive/folders/1Xw3fYDXccj5MJHpAMeb7RTrCGrWnHiHO" },
            { name: "VEETIYAH A/P SUROMUTHU", drive: "https://drive.google.com/drive/folders/1ehX5znqZvyMyjCBRO55MaVSdYaitKaHF" },
            { name: "ZULKARNAIN BIN M. AYOB", drive: "https://drive.google.com/drive/folders/1t5Tu4CA-0ivVS6VM_ugU0SUPkoOmytrK" },
            { name: "NOR AZAH BINTI MORI", drive: "https://drive.google.com/drive/folders/1mEFlaUTpTYQi9BgonoJ4GB7SrWSePoCa" }
        ];

        // Fill Guru Dropdown
        const gSelect = document.getElementById('guruSelect');
        MASTER_GURU_LIST.forEach(g => {
            const opt = document.createElement('option');
            opt.text = g.name;
            opt.value = g.name;
            opt.setAttribute('data-drive', g.drive);
            gSelect.add(opt);
        });

        // Tab System
        window.showTab = function(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('tab-active'));
            document.getElementById('content-' + tabId).classList.remove('hidden');
            document.getElementById('tab-' + tabId).classList.add('tab-active');
            
            if(tabId.includes('rekod')) fetchData(tabId.split('-')[1]);
        };

        // UI Logic
        window.updateEvidenGuru = function() {
            const select = document.getElementById('guruSelect');
            const wrapper = document.getElementById('pautanGuruWrapper');
            const link = document.getElementById('pautanGuruLink');
            if (select.value) {
                link.href = select.options[select.selectedIndex].getAttribute('data-drive');
                wrapper.classList.remove('hidden');
            } else {
                wrapper.classList.add('hidden');
            }
        };

        // Firebase Save
        window.saveData = async function(event, type) {
            event.preventDefault();
            const data = {
                tarikh: new Date().toLocaleDateString('ms-MY'),
                timestamp: new Date(),
                program: document.getElementById(`program-${type}`).value,
                pencapaian: document.getElementById(`capai-${type}`).value
            };

            if(type === 'sekolah') {
                data.peringkat = document.getElementById('peringkat-sekolah').value;
                data.eviden = document.getElementById('eviden-sekolah').value || "No Link";
            } else {
                data.guru = document.getElementById('guruSelect').value;
                data.eviden = document.getElementById('guruSelect').options[document.getElementById('guruSelect').selectedIndex].getAttribute('data-drive');
            }

            try {
                const colName = type === 'sekolah' ? 'rekod_sekolah' : 'rekod_guru';
                await addDoc(collection(db, colName), data);
                alert('Berjaya Simpan ke Cloud!');
                event.target.reset();
                showTab('rekod-' + type);
            } catch (e) {
                alert('Ralat: ' + e.message);
            }
        };

        // Firebase Fetch
        async function fetchData(type) {
            const tbody = document.getElementById(`table-${type}-body`);
            tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center">Memuatkan data...</td></tr>';
            
            const colName = type === 'sekolah' ? 'rekod_sekolah' : 'rekod_guru';
            const q = query(collection(db, colName), orderBy("timestamp", "desc"));
            const snapshot = await getDocs(q);
            
            let html = '';
            let i = 1;
            snapshot.forEach(doc => {
                const item = doc.data();
                html += `<tr class="border-b hover:bg-gray-50">
                    <td class="p-3">${i++}</td>
                    <td class="p-3">${item.tarikh}</td>
                    <td class="p-3 font-bold">${type === 'guru' ? item.guru : item.program}</td>
                    <td class="p-3">${type === 'guru' ? item.program : item.pencapaian}</td>
                    <td class="p-3"><a href="${item.eviden}" target="_blank" class="text-blue-500 underline">Lihat</a></td>
                </tr>`;
            });
            tbody.innerHTML = html || '<tr><td colspan="5" class="p-4 text-center">Tiada rekod.</td></tr>';
        }

        window.copyShareLink = () => {
            navigator.clipboard.writeText(window.location.href);
            alert('Pautan Dashboard Berjaya Disalin!');
        };
    </script>
</body>
</html>
```
